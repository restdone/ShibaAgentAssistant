<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: sans-serif;
      width: 220px;
      padding: 14px;
      margin: 0;
      background: #1a1a1a;
      color: #eee;
    }
    h3 { margin: 0 0 10px; font-size: 15px; }
    #status {
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
    }
    .connected { background: #1e5e2e; color: #7dff9a; }
    .disconnected { background: #5e1e1e; color: #ff7d7d; }
    p { font-size: 12px; color: #aaa; margin-top: 10px; }
  </style>
</head>
<body>
  <h3>Shiba Browser Agent</h3>
  <div id="status" class="disconnected">Disconnected</div>
  <p>Connects to ws://localhost:9009</p>
  <script src="popup.js"></script>
</body>
</html>
